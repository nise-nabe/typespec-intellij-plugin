name: Run UI tests

on:
  workflow_dispatch:

jobs:
  ui-tests:
    name: Remote Robot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          cache-provider: basic
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Prepare JetBrains consent
        run: chmod +x scripts/*.sh && ./scripts/prepare-jetbrains-consent.sh
      - name: Start IDE for UI tests
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          ./gradlew :plugin:runIdeForUiTests --no-daemon &
      - name: Wait for robot server
        uses: jtalk/url-health-check-action@edb3d9eb4b329b7465c3c1dcef6a2a869f8b0f8f # v4
        with:
          url: http://127.0.0.1:8082
          max-attempts: 30
          retry-delay: 20s
      - name: Run UI tests
        run: ./gradlew :ui-test:test --no-daemon -Probot.server.url=http://127.0.0.1:8082
